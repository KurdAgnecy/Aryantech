        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #020308;
        }

        body { 
            background-image:

            justify-content: center; 
            align-items: center; 
            color: #fff;
            padding: 20px 0;
        }

        .main-wrapper {
            width: 100%; 
            max-width: 410px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            text-align: center;
        }

        .brand-zone {
            margin-bottom: 5px;
        }

        .brand-logo-text {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ffffff 20%, #00d2ff 60%, #9d4edd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .brand-slogan {
            font-size: 0.95rem;
            font-weight: 500;
            color: #00f0ff;
            margin-top: 10px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
        }

        .center-card {
            background: rgba(6, 9, 22, 0.7);
            border: 1px solid rgba(0, 210, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 35px 22px;
            border-radius: 20px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), inset 0 1px 0cpx rgba(0, 210, 255, 0.1);
        }

        .phone-ring-svg {
            width: 65px;
            height: 65px;
            margin: 0 auto;
            fill: #fff;
            animation: ring-vibe 1.2s infinite ease-in-out;
            filter: drop-shadow(0 0 12px rgba(0, 210, 255, 0.5));
        }

        @keyframes ring-vibe {
            0%, 100% { transform: rotate(0) scale(1); }
            10%, 30%, 50% { transform: rotate(-10deg) scale(1.05); }
            20%, 40%, 60% { transform: rotate(10deg) scale(1.05); }
            70% { transform: rotate(0) scale(1); }
        }

        .instruction {
            font-size: 1.15rem;
            font-weight: 700;
            margin-top: 18px;
            color: #ffffff;
            line-height: 1.5;
            letter-spacing: 0.5px;
        }

        .arrow-down-svg {
            width: 32px;
            height: 32px;
            margin: 12px auto 0 auto;
            fill: #00d2ff;
            animation: arrow-bounce 1.3s infinite ease-in-out;
        }

        @keyframes arrow-bounce {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(10px); opacity: 1; }
        }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            display: flex; 
            align-items: center;
            padding: 18px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 1.25rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .link-item svg {
            width: 32px;
            height: 32px;
            margin-left: 15px;
            transition: all 0.3s;
            animation: icon-shake 2s infinite ease-in-out;
        }

        @keyframes icon-shake {
            0%, 70%, 100% { transform: scale(1) rotate(0); }
            75%, 85% { transform: scale(1.1) rotate(8deg); }
            80%, 90% { transform: scale(1.1) rotate(-8deg); }
        }

        .link-item span { 
            flex-grow: 1; 
            text-align: right; 
        }

        /* وەتسئەپ */
        .whatsapp-style { border-right: 4px solid #25d366; }
        .whatsapp-style svg { fill: #25d366; }
        .whatsapp-style:hover { 
            background: rgba(37, 211, 102, 0.07); 
            border-color: #25d366;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.2);
            transform: translateX(-3px);
        }

        /* ڤایبەر */
        .viber-style { border-right: 4px solid #7360f2; }
        .viber-style svg { fill: #7360f2; }
        .viber-style:hover { 
            background: rgba(115, 96, 242, 0.07); 
            border-color: #7360f2;
            box-shadow: 0 0 20px rgba(115, 96, 242, 0.2);
            transform: translateX(-3px);
        }

        /* سناپچات */
        .snapchat-style { border-right: 4px solid #fffc00; }
        .snapchat-style svg { fill: #fffc00; }
        .snapchat-style:hover { 
            background: rgba(255, 252, 0, 0.05); 
            border-color: #fffc00;
            box-shadow: 0 0 20px rgba(255, 252, 0, 0.15);
            transform: translateX(-3px);
        }

        /* ئەنیمەیشنی هێڵی برسک */
        .link-item::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 25%; height: 100%;
            background: linear-gradient(to right, rgba(0, 210, 255, 0) 0%, rgba(0, 210, 255, 0.15) 100%);
            transform: skewX(-30deg);
            animation: tech-glint 3.5s infinite linear;
        }
        @keyframes tech-glint {
            0% { left: -100%; }
            20%, 100% { left: 140%; }
        }
