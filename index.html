        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body {

        .main-wrapper {
            width: 100%;

            gap: 25px;
            text-align: center;
        }

        .brand-zone {
            margin-bottom: 5px;
        }

        .brand-logo-text {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ffffff 20%, #00d2ff 60%, #9d4edd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .brand-slogan {
            font-size: 0.95rem;
            font-weight: 500;
            color: #00f0ff;
            margin-top: 10px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
        }

        .center-card {
            background: rgba(6, 9, 22, 0.7);
            border: 1px solid rgba(0, 210, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 35px 22px;
            border-radius: 20px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), inset 0 1px 0px rgba(0, 210, 255, 0.1);
        }

        .instruction {
            font-size: 1.15rem;
            font-weight: 700;
            margin-top: 5px;
            color: #ffffff;
            line-height: 1.5;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        /* ستایلی تیری جوڵاو */
        .animated-arrow {
            width: 32px;
            height: 32px;
            margin: 0 auto 25px auto;
            color: #00d2ff;
            animation: bounce 1.5s infinite ease-in-out;
            filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.6));
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-12px); }
            60% { transform: translateY(-6px); }
        }

        .link-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .btn svg { width: 22px; height: 22px; fill: currentColor; }

        .btn-whatsapp { background: linear-gradient(135deg, #25D366, #128C7E); }
        .btn-viber { background: linear-gradient(135deg, #7360f2, #5a45d1); }
        .btn-snap { background: linear-gradient(135deg, #FFFC00, #d4d100); color: #000; }
        .btn-insta { background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }

        .footer-text {

            font-size: 0.95rem;
            font-weight: 600;
            color: #a9b5cc;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            letter-spacing: 0.5px;
