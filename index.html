    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #020308;
        }

        body { 
            background-image: 
                radial-gradient(circle at 50% 15%, #0b1a3a 0%, transparent 60%),
                radial-gradient(circle at 85% 85%, #18092b 0%, transparent 50%);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #fff;
            padding: 20px 0;
        }

        .main-wrapper {
            width: 100%; 
            max-width: 410px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            text-align: center;
        }

        .brand-zone {
            margin-bottom: 5px;
        }

        .brand-logo-text {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ffffff 20%, #00d2ff 60%, #9d4edd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .brand-slogan {
            font-size: 0.95rem;
            font-weight: 500;
            color: #00f0ff;
            margin-top: 10px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
        }

        .center-card {
            background: rgba(6, 9, 22, 0.7);
            border: 1px solid rgba(0, 210, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 35px 22px;
            border-radius: 20px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), inset 0 1px 0px rgba(0, 210, 255, 0.1);
        }

        .phone-ring-svg {
            width: 65px;
            height: 65px;
            margin: 0 auto;
            fill: #fff;
            animation: ring-vibe 1.2s infinite ease-in-out;
            filter: drop-shadow(0 0 12px rgba(0, 210, 255, 0.5));
        }

        @keyframes ring-vibe {
            0%, 100% { transform: rotate(0) scale(1); }
            10%, 30%, 50% { transform: rotate(-10deg) scale(1.05); }
            20%, 40%, 60% { transform: rotate(10deg) scale(1.05); }
            70% { transform: rotate(0) scale(1); }
        }

        .instruction {
            font-size: 1.15rem;
            font-weight: 700;
            margin-top: 18px;
            color: #ffffff;
            line-height: 1.5;
            letter-spacing: 0.5px;
            margin-bottom: 25px;
        }

        .link-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .btn-whatsapp { background: linear-gradient(135deg, #25D366, #128C7E); }
        .btn-viber { background: linear-gradient(135deg, #7360f2, #5a45d1); }
        .btn-snap { background: linear-gradient(135deg, #FFFC00, #d4d100); color: #000; }
        .btn-insta { background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-lead { background: linear-gradient(135deg, #9d4edd, #5a189a); border: 1px solid #c77dff; }
        .btn-sale { background: linear-gradient(135deg, #ff0055, #c80043); border: 1px solid #ff4d85; }

<body>

    <div class="main-wrapper">
        <div class="brand-zone">
            <h1 class="brand-logo-text">Aryan Tech</h1>
            <p class="brand-slogan">باشترین خزمەتگوزاری تەکنەلۆژی</p>
        </div>

        <div class="center-card">
            
            <svg class="phone-ring-svg" viewBox="0 0 24 24">
                <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 1.01-.63 1.01-1.18v-3.45c0-.54-.45-.99-.99-.99z"/>
            </svg>

            <div class="instruction">ڕێگاکانی پەیوەندی و خزمەتگوزارییەکان</div>
            
            <div class="link-buttons">
                <!-- بەشی Sales - بۆ فرۆشتن -->
                <!-- تێبینی: لە شوێنی # لینکی بەرهەمەکەت دابنێ -->
                <a href="#" class="btn btn-sale" onclick="trackTikTokEvent('CompletePayment', 'Sales')">
                    کڕینی بەرهەم (Sales)
                </a>

                <!-- بەشی Leads - بۆ فۆڕم و لیدس -->
                <!-- تێبینی: لە شوێنی # لینکی فۆڕمەکەت دابنێ -->
                <a href="#" class="btn btn-lead" onclick="trackTikTokEvent('SubmitForm', 'Lead')">
                    پڕکردنەوەی فۆڕم (Lead)
                </a>

                <hr style="border-color: rgba(255,255,255,0.1); margin: 10px 0;">

                <!-- واتساپ -->
                <a href="https://wa.me/9647729585559" target="_blank" class="btn btn-whatsapp" onclick="trackTikTokEvent('Contact', 'WhatsApp')">
                    واتساپ (WhatsApp)
                </a>

                <!-- ڤایبەر -->
                <a href="viber://chat?number=9647729585559" class="btn btn-viber" onclick="trackTikTokEvent('Contact', 'Viber')">
                    ڤایبەر (Viber)
                </a>

                <!-- ئینستاگرام -->
                <a href="https://www.instagram.com/aryann.tech?igsh=MXEzcWozYWZwaHVyOA==" target="_blank" class="btn btn-insta" onclick="trackTikTokEvent('ClickButton', 'Instagram')">
                    ئینستاگرام (Instagram)
                </a>

                <!-- سناپچات -->
                <a href="https://www.snapchat.com/add/aryan.it?share_id=LQj7pI5PGuE&locale=en-US" target="_blank" class="btn btn-snap" onclick="trackTikTokEvent('ClickButton', 'Snapchat')">
                    سناپچات (Snapchat)
                </a>
            </div>
        </div>
    </div>

    <!-- سکریپتی ناردنی ئیڤێنتەکان بۆ پیکسێڵ -->
    <script>
        function trackTikTokEvent(eventName, buttonName) {
            if (typeof ttq !== 'undefined') {
                ttq.track(eventName, {
                    content_name: buttonName,
                    content_type: 'product'
                });
            }
        }
    </script>
